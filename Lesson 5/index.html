<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Krissy — Link-in-Bio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-theme="dark">
  <main class="page">
    <section class="card" aria-label="Krissy link page">
      <div class="photo" aria-hidden="true">KM</div>
      <h1 class="name">Krissy Morency</h1>
      <p class="bio">Personal designer page for portfolio, contact, and about me.</p>

      <div class="links" role="list">
        <a class="link-btn" href="about.html" role="listitem">
          <span class="icon">👋</span>
          <span>About Me</span>
        </a>
        <a class="link-btn" href="https://krissymorency.myportfolio.com" role="listitem" target="_blank" rel="noopener noreferrer">
          <span class="icon">🎨</span>
          <span>Portfolio</span>
        </a>
        <a class="link-btn" href="mailto:kfmorency@yahoo.com" role="listitem">
          <span class="icon">✉️</span>
          <span>Email</span>
        </a>
      </div>

      <div class="controls">
        <button id="theme-toggle" class="theme-toggle" aria-pressed="true" aria-label="Toggle light mode">🌙</button>
      </div>

      <footer class="card-footer">Made with coffee &amp; Copilot</footer>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
